	<div class="backdrop closebtn" id="backdrop"></div>
	<div class="movieModel" id="movieModel">
		<form  id="movieform">
			<div class="card">
				<div class="card-header d-flex justify-content-between align-items-center">
					<h2>Add movie Details</h2>
					<i class="fa-solid fa-xmark fa-2x closebtn"></i>
				</div>
				<div class="card-body">
					<div class="form-group">
						<label for="movieName">Movie Name</label>
						<input type="text" class="form-control" id="movieName">
					</div>
					<div class="form-group">
						<label for="movieImg">Movie Images</label>
						<input type="text" class="form-control" id="movieImg">
					</div>
					<div class="form-group">
						<label for="movieDesciption">Movie Desciption</label>
						<textarea rows="4" class="form-control" id="movieDesciption"></textarea>
					</div>
					<div class="form-group">
						<label for="movieRating">Movie Rating</label>
						<select name="movieRating" class="form-control" id="movieRating">
							<option value="1">1</option>
							<option value="2">2</option>
							<option value="3">3</option>
							<option value="4">4</option>
							<option value="5">5</option>
						</select>
					</div>
					
				</div>
				<div class="card-footer d-flex justify-content-between align-items-center">
					<button class="btn btn-sm ntflx-secondary-btn" id="addmovie">Add Movie</button>
					<button type="button" class="btn btn-sm ntflx-secondary-btn d-none" id="updatemovie">update Movie</button>
					<button type="button" class="btn btn-sm ntflx-primary-btn closebtn">close</button>

				</div>
			</div>
		</form>
